<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレーラーハウス メーカーナビ｜北海道キャンプ場開業・投資サポート</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #e11d48;
            --hokkaido-green: #166534;
            --bg-slate: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius-lg: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg-slate); color: var(--text-main); line-height: 1.6; }

        /* Header */
        header { background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1.25rem; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 500; font-size: 0.9rem; }

        /* Hero */
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: white; padding: 4rem 1.5rem; text-align: center; }
        .hero h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); margin-bottom: 1rem; line-height: 1.3; }
        .hero p { opacity: 0.9; max-width: 700px; margin: 0 auto 2rem; }

        /* Tabs */
        .tabs-wrapper { background: white; border-bottom: 1px solid #e2e8f0; sticky; top: 72px; z-index: 90; }
        .tabs { max-width: 1200px; margin: 0 auto; display: flex; }
        .tab-btn { flex: 1; padding: 1.25rem; border: none; background: none; cursor: pointer; font-weight: 700; color: var(--text-muted); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; }
        .section { display: none; }
        .section.active { display: block; }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: var(--radius-lg); padding: 2rem; border: 1px solid #e2e8f0; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .featured-tag { position: absolute; top: -10px; right: 20px; background: var(--hokkaido-green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }

        .badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-red { background: #fee2e2; color: #b91c1c; }

        /* Showroom Card Specific */
        .showroom-card { display: flex; flex-direction: column; justify-content: space-between; }
        .btn-reserve { display: block; width: 100%; text-align: center; background: var(--primary); color: white; padding: 0.8rem; border-radius: 8px; text-decoration: none; font-weight: 700; margin-top: 1.5rem; transition: 0.2s; }
        .btn-reserve:hover { background: #1e40af; }

        /* Comparison Table */
        .table-scroll { overflow-x: auto; background: white; border-radius: var(--radius-lg); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f1f5f9; padding: 1rem; text-align: left; font-size: 0.85rem; }
        td { padding: 1rem; border-top: 1px solid #e2e8f0; font-size: 0.9rem; }

        /* Footer */
        footer { background: #0f172a; color: white; padding: 4rem 1.5rem; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="#" class="logo">🏔️ TRAILER NAVI</a>
        <nav class="nav-links">
            <a href="https://trailer-house-hokkaido.com/for-investment/reservation" target="_blank">開業相談・予約</a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="hero-inner">
        <h1>北海道キャンプ場開業を<br>トレーラーハウスで加速させる</h1>
        <p>国内主要メーカーの最新スペック、展示会場、予約窓口を網羅。積雪・断熱対策が必須の北海道において、最適なパートナー選びをサポートします。</p>
    </div>
</section>

<div class="tabs-wrapper">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('makers')">メーカー紹介</button>
        <button class="tab-btn" onclick="switchTab('showrooms')">展示会場・予約</button>
        <button class="tab-btn" onclick="switchTab('compare')">スペック比較</button>
    </div>
</div>

<main class="container">
    <section id="makers" class="section active">
        <div class="grid" id="makers-grid"></div>
    </section>

    <section id="showrooms" class="section">
        <div style="margin-bottom: 2rem; text-align: center;">
            <p>※実物見学は完全予約制です。各社の予約専用サイトよりお申し込みください。</p>
        </div>
        <div class="grid" id="showroom-grid"></div>
    </section>

    <section id="compare" class="section">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>メーカー</th>
                        <th>主な用途</th>
                        <th>車検対応</th>
                        <th>北海道実績</th>
                        <th>特徴</th>
                    </tr>
                </thead>
                <tbody id="compare-tbody"></tbody>
            </table>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 トレーラーハウス メーカーナビ｜北海道キャンプ場開業サポート</p>
    <div class="footer-links" id="footer-links"></div>
</footer>

<script>
    const makers = [
        {
            name: "トレーラーハウスデベロップメント (THD)",
            short: "THD",
            tags: ["宿泊", "店舗", "事務所"],
            desc: "国内シェアNO.1。全車両「車検付」で移動の自由と資産価値を両立。北海道の積雪・寒冷地設置実績が最も豊富です。",
            featured: true,
            hokkaido: "✅ 多数あり",
            shaken: "✅ 全車取得",
            url: "https://www.trailer-house.co.jp/"
        },
        {
            name: "ルクラ株式会社 (Lukura)",
            short: "ルクラ",
            tags: ["店舗", "サロン", "宿泊"],
            desc: "デザイン性とカスタマイズ性に強み。美容院やカフェとしての利用が多く、開業予約システムも完備されています。",
            featured: false,
            hokkaido: "⚠️ 要相談",
            shaken: "✅ 対応可",
            url: "https://www.lukura.jp/"
        },
        {
            name: "カンバーランド・ジャパン",
            short: "カンバーランド",
            tags: ["宿泊", "RVパーク", "2階建"],
            desc: "日本のトレーラーハウスの先駆け。RVリゾート開発のパイオニアで、宿泊事業のノウハウ提供が強みです。",
            featured: true,
            hokkaido: "✅ 実績あり",
            shaken: "✅ 対応可",
            url: "https://www.cumberland.jp/"
        },
        {
            name: "HCT (ハウスカーテクノロジー)",
            short: "HCT",
            tags: ["大型店舗", "事務所"],
            desc: "LIXILグループとの連携による高い住設品質。最大級のサイズと高い断熱性能をLPで詳しく公開しています。",
            featured: false,
            hokkaido: "✅ 対応可",
            shaken: "✅ 対応可",
            url: "https://hc-t.jp/lp/"
        },
        {
            name: "BIBOX",
            short: "BIBOX",
            tags: ["住居", "趣味", "BOX型"],
            desc: "スタイリッシュなコンテナ風外観が特徴。定住や趣味の部屋として、2026年最新のライフスタイルを提案。",
            featured: false,
            hokkaido: "⚠️ 寒冷地仕様確認",
            shaken: "✅ 対応可",
            url: "https://bibox.style/"
        }
    ];

    const showrooms = [
        { name: "北海道 苫小牧展示場", maker: "THD", addr: "北海道苫小牧市", btnLabel: "北海道開業相談・予約", url: "https://trailer-house-hokkaido.com/for-investment/reservation" },
        { name: "ルクラ 豊橋ショールーム", maker: "ルクラ", addr: "愛知県豊橋市", btnLabel: "見学予約ページへ", url: "https://www.lukura.jp/reservation/" },
        { name: "つくば展示場 (関東最大級)", maker: "THD", addr: "茨城県つくば市", btnLabel: "見学予約する", url: "https://www.trailer-house.co.jp/" },
        { name: "長野本社展示場", maker: "カンバーランド", addr: "長野県須坂市", btnLabel: "公式サイトで確認", url: "https://www.cumberland.jp/" },
        { name: "BIBOX 千葉木更津展示場", maker: "BIBOX", addr: "千葉県木更津市", btnLabel: "見学予約(公式サイト)", url: "https://bibox.style/" },
        { name: "HCT 名古屋/岐阜ショールーム", maker: "HCT", addr: "愛知県・岐阜県", btnLabel: "事業用LPで詳細を見る", url: "https://hc-t.jp/lp/" }
    ];

    function renderMakers() {
        const grid = document.getElementById('makers-grid');
        grid.innerHTML = makers.map(m => `
            <div class="card">
                ${m.featured ? '<div class="featured-tag">北海道実績NO.1</div>' : ''}
                <span class="badge badge-blue">${m.tags.join(' / ')}</span>
                <h3 style="margin: 0.5rem 0;">${m.name}</h3>
                <p style="font-size: 0.9rem; color: #475569; margin-bottom: 1.5rem;">${m.desc}</p>
                <a href="${m.url}" target="_blank" style="color: var(--primary); font-weight: 700; text-decoration: none;">公式サイト ↗</a>
            </div>
        `).join('');
    }

    function renderShowrooms() {
        const grid = document.getElementById('showroom-grid');
        grid.innerHTML = showrooms.map(s => `
            <div class="card showroom-card">
                <div>
                    <span class="badge badge-red">完全予約制</span>
                    <h3 style="font-size: 1.1rem; margin: 0.5rem 0;">${s.name}</h3>
                    <p style="font-size: 0.85rem; color: #64748b;">運営: ${s.maker}</p>
                    <p style="font-size: 0.85rem; color: #1e293b; margin-top: 0.5rem;">📍 ${s.addr}</p>
                </div>
                <a href="${s.url}" target="_blank" class="btn-reserve">${s.btnLabel}</a>
            </div>
        `).join('');
    }

    function renderCompare() {
        const tbody = document.getElementById('compare-tbody');
        tbody.innerHTML = makers.map(m => `
            <tr>
                <td><strong>${m.short}</strong></td>
                <td>${m.tags.slice(0,2).join(', ')}</td>
                <td>${m.shaken}</td>
                <td>${m.hokkaido}</td>
                <td style="font-size: 0.8rem;">${m.desc.substring(0,30)}...</td>
            </tr>
        `).join('');
    }

    function switchTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Init
    renderMakers();
    renderShowrooms();
    renderCompare();
    document.getElementById('footer-links').innerHTML = makers.map(m => `<a href="${m.url}" target="_blank">${m.short}</a>`).join('');
</script>

</body>
</html>
